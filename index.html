<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Portfolio Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <header class="header">
        <h1>Stock Portfolio Tracker</h1>
        <p class="subtitle">Track and analyze your investments</p>

    </header>

    <main>
        <!-- Add Stock Form -->
        <section class="card form-card">
            <h2>Add Stock</h2>
            <form id="add-stock-form">
                <div class="form-group">
                    <label for="symbol">Stock Symbol</label>
                    <input type="text" id="symbol" name="symbol" placeholder="e.g. AAPL">
                </div>
                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" name="quantity" min="0" step="1">
                </div>
                <div class="form-group">
                    <label for="buy-price">Buy Price</label>
                    <input type="number" id="buy-price" name="buyPrice" min="0" step="0.01">
                </div>
                <button type="submit" class="btn">Add Stock</button>
            </form>
        </section>

        <!-- Portfolio Summary -->
        <section class="summary-grid">
            <div class="card summary-card">
                <span class="icon">💰</span>
                <h3>Total Investment</h3>
                <p class="value" id="total-investment">$0</p>
            </div>
            <div class="card summary-card">
                <span class="icon">📈</span>
                <h3>Current Value</h3>
                <p class="value" id="current-value">$0</p>
            </div>
            <div class="card summary-card">
                <span class="icon">💹</span>
                <h3>Profit / Loss</h3>
                <p class="value" id="profit-loss">$0</p>
            </div>
        </section>

        <!-- Portfolio Table -->
        <section class="card table-card">
            <h2>Your Portfolio</h2>
            <table id="portfolio-table">
                <thead>
                    <tr>
                        <th>Stock Symbol</th>
                        <th>Quantity</th>
                        <th>Buy Price</th>
                        <th>Current Price</th>
                        <th>Profit/Loss</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Rows will be added dynamically -->
                </tbody>
            </table>
        </section>

        <!-- Charts -->
        <section class="charts-grid">
            <div class="card chart-card">
                <h3>Portfolio Allocation</h3>
                <canvas id="allocation-chart"></canvas>
            </div>
            <div class="card chart-card">
                <h3>Profit / Loss by Stock</h3>
                <canvas id="profit-loss-chart"></canvas>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
